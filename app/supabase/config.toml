# Supabase project configuration. Run `supabase init` to regenerate.
project_id = "cappy"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329

[realtime]
enabled = true
ip_version = "IPv4"
max_header_length = 4096

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "cappy://"
additional_redirect_urls = [
  "cappy://auth-callback",
  "https://cappy.closedose.com/auth-callback"
]
jwt_expiry = 3600
enable_signup = true
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
secure_password_change = true

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.nfc-resolve]
verify_jwt = true

[functions.accept-invite]
verify_jwt = true

[analytics]
enabled = false

[experimental]
orioledb_version = ""
