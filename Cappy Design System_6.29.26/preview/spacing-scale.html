<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing — 4pt Grid" subtitle="12 spacing tokens" viewport="700x380" -->
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="_base.css">
<style>
.card-frame { background: var(--bg); }
h4 { font-family: var(--font-display); font-size: 18px; margin: 0 0 14px; color: var(--fg); font-weight: 600; }
.row { display: grid; grid-template-columns: 60px 1fr 80px; gap: 10px; align-items: center; padding: 4px 0; }
.token { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
.bar { height: 14px; background: var(--teal-200); border-radius: 4px; }
.px { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); text-align: right; }
</style></head>
<body><div class="card-frame">
<h4>Spacing — 4pt grid</h4>
<div id="rows"></div>
<script>
const tokens = [
  ['--space-1',4],['--space-2',8],['--space-3',12],['--space-4',16],
  ['--space-5',20],['--space-6',24],['--space-8',32],['--space-10',40],
  ['--space-12',48],['--space-16',64],['--space-20',80],['--space-24',96]
];
document.getElementById('rows').innerHTML = tokens.map(([t,v])=>
  `<div class="row"><div class="token">${t}</div><div class="bar" style="width:${v}px"></div><div class="px">${v}px</div></div>`).join('');
</script>
</div></body></html>
