<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing — Shadows" subtitle="Three-step elevation" viewport="700x240" -->
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="_base.css">
<style>
.card-frame { background: var(--bg); padding: 32px 24px; }
h4 { font-family: var(--font-display); font-size: 18px; margin: 0 0 18px; color: var(--fg); font-weight: 600; }
.row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 22px; }
.tile { display: flex; flex-direction: column; align-items: center; gap: 10px; }
.box { width: 100%; height: 90px; background: #FFFFFF; border-radius: 16px; border: 1px solid var(--hairline); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 600; color: var(--fg); }
.s1 { box-shadow: 0 1px 2px rgba(11,30,29,0.04), 0 4px 12px -6px rgba(11,30,29,0.08); }
.s2 { box-shadow: 0 1px 2px rgba(11,30,29,0.05), 0 8px 24px -8px rgba(11,30,29,0.12); }
.s3 { box-shadow: 0 2px 4px rgba(11,30,29,0.06), 0 16px 40px -12px rgba(11,30,29,0.16); }
.token { font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
.use { font-family: var(--font-sans); font-size: 11px; color: var(--fg-3); }
</style></head>
<body><div class="card-frame">
<h4>Shadows — soft, ambient, low-contrast</h4>
<div class="row">
  <div class="tile"><div class="box s1">level 1</div><div class="token">--shadow-1</div><div class="use">resting cards</div></div>
  <div class="tile"><div class="box s2">level 2</div><div class="token">--shadow-2</div><div class="use">hover, primary cards</div></div>
  <div class="tile"><div class="box s3">level 3</div><div class="token">--shadow-3</div><div class="use">modals, popovers</div></div>
</div>
</div></body></html>
