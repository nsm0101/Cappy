<!doctype html>
<!-- @dsCard group="Type" name="Type — Dose Numeral" subtitle="Nunito Sans 700 + DM Mono unit" viewport="700x200" -->
<html><head><meta charset="utf-8"><title>Dose numeral</title>
<link rel="stylesheet" href="_base.css">
<style>
.card-frame { background: var(--bg); display: flex; align-items: center; gap: 32px; }
.numeral {
  font-family: var(--font-display);
  font-size: 120px;
  line-height: 0.95;
  font-weight: 700;
  font-feature-settings: "tnum" 1;
  letter-spacing: -0.03em;
  color: var(--fg);
}
.unit {
  font-family: var(--font-mono);
  font-size: 24px;
  color: var(--fg-2);
  font-weight: 500;
  margin-left: 10px;
  letter-spacing: 0.04em;
}
.meta { display: flex; flex-direction: column; gap: 6px; }
.meta .label { font-family: var(--font-mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-3); }
.meta .name { font-family: var(--font-display); font-size: 22px; font-weight: 700; color: var(--fg); }
.meta .desc { font-family: var(--font-sans); font-size: 13px; color: var(--fg-2); line-height: 1.5; max-width: 280px; }
</style></head>
<body><div class="card-frame">
<div class="numeral">5<span class="unit">mL</span></div>
<div class="meta">
  <div class="label">Dose Numeral</div>
  <div class="name">Nunito Sans 700 · DM Mono</div>
  <div class="desc">The dose itself in Nunito Sans — warm, rounded, considered. Unit label in DM Mono for that quiet medical-data feel. Tabular figures.</div>
</div>
</div></body></html>
