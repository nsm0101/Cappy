<!doctype html>
<!-- @dsCard group="Colors" name="Colors — Neutrals & Cream" subtitle="Warm slate ramp + cream surfaces" viewport="700x230" -->
<html><head><meta charset="utf-8"><title>Neutrals & Cream</title>
<link rel="stylesheet" href="_base.css">
<style>
.card-frame { background: var(--bg); }
.ramp { display: grid; grid-template-columns: repeat(11, 1fr); gap: 6px; }
.sw { height: 80px; border-radius: 10px; padding: 6px 8px; display: flex; flex-direction: column; justify-content: space-between; font-family: var(--font-mono); font-size: 10px; border: 1px solid var(--hairline); }
.sw .num { font-weight: 600; }
h4 { font-family: var(--font-display); font-size: 18px; margin: 0 0 14px; color: var(--fg); font-weight: 600; }
.surfaces { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 14px; }
.surface { border-radius: 12px; padding: 14px; border: 1px solid var(--hairline); font-size: 11px; font-family: var(--font-mono); }
.note { margin-top: 10px; font-size: 12px; color: var(--fg-3); }
</style></head>
<body><div class="card-frame">
<h4>Neutrals — warm slates + cream</h4>
<div class="ramp" id="ramp"></div>
<div class="surfaces">
  <div class="surface" style="background:#FBF8F2;color:#322F2C">cream<br><span style="color:#8F8B82">page bg</span></div>
  <div class="surface" style="background:#FFFFFF;color:#322F2C">white<br><span style="color:#8F8B82">card</span></div>
  <div class="surface" style="background:#F4EFE5;color:#322F2C">cream-2<br><span style="color:#8F8B82">inset</span></div>
</div>
<div class="note">Neutrals carry a faint warm undertone — never pure gray. Cream (#FBF8F2) is the marketing page ground.</div>
<script>
const ramp = [
  ['0','#FFFFFF','#322F2C'],['25','#FBFAF7','#322F2C'],['50','#F7F5F0','#322F2C'],
  ['100','#EFEBE2','#322F2C'],['200','#DDD8CC','#322F2C'],['300','#BDB8AC','#322F2C'],
  ['400','#8F8B82','#FFFFFF'],['500','#6A6760','#FFFFFF'],['600','#4A4844','#FFFFFF'],
  ['700','#322F2C','#FFFFFF'],['800','#1F1D1B','#FFFFFF']
];
document.getElementById('ramp').innerHTML = ramp.map(([n,h,c])=>
  `<div class="sw" style="background:${h};color:${c}"><div class="num">${n}</div><div>${h}</div></div>`).join('');
</script>
</div></body></html>
