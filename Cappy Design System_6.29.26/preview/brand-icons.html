<!doctype html>
<!-- @dsCard group="Brand" name="Brand — Iconography" subtitle="Lucide-style, 1.75px stroke (icons fixed)" viewport="700x240" -->
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="_base.css">
<style>
.card-frame { background: var(--bg); }
h4 { font-family: var(--font-display); font-size: 18px; margin: 0 0 6px; color: var(--fg); font-weight: 600; }
.sub { font-family: var(--font-sans); font-size: 12px; color: var(--fg-3); margin-bottom: 14px; }
.row { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
.icon-tile { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 12px 6px; background: white; border-radius: 12px; border: 1px solid var(--hairline); }
.icon-tile svg { color: #18A78D; }
.icon-tile .name { font-family: var(--font-mono); font-size: 9px; color: var(--fg-3); }
</style></head>
<body><div class="card-frame">
<h4>Iconography — Lucide, 1.75px stroke</h4>
<div class="sub">Workhorse pediatric set. Inherits currentColor.</div>
<div class="row" id="row"></div>
<script>
// Each entry: [name, innerSvgString]
const W = 1.75;
const icons = [
  ['baby',
    // Lucide "baby" — head with closed eyes (smile-shape arcs) and a small smile
    '<path d="M9 12h.01"/>' +
    '<path d="M15 12h.01"/>' +
    '<path d="M10 16c.5.3 1.2.5 2 .5s1.5-.2 2-.5"/>' +
    '<path d="M19 6.3a9 9 0 0 1 1.8 3.9 2 2 0 0 1 0 3.6 9 9 0 0 1-17.6 0 2 2 0 0 1 0-3.6A9 9 0 0 1 12 3c2 0 3.5 1.1 3.5 2.5s-.9 2.5-2 2.5c-.8 0-1.5-.4-1.5-1"/>'
  ],
  ['pill',
    '<path d="m10.5 20.5 10-10a4.95 4.95 0 1 0-7-7l-10 10a4.95 4.95 0 1 0 7 7Z"/>' +
    '<path d="m8.5 8.5 7 7"/>'
  ],
  ['heart-pulse',
    '<path d="M19 14c1.5-1.5 3-3.3 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.8 0-3 .5-4.5 2-1.5-1.5-2.7-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.2 1.5 4 3 5.5l7 7Z"/>' +
    '<path d="M3.2 12H7l1.5-3 3 6 1.5-3h6.8"/>'
  ],
  ['clock',
    '<circle cx="12" cy="12" r="10"/>' +
    '<path d="M12 6v6l4 2"/>'
  ],
  ['moon',
    '<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>'
  ],
  ['droplet',
    '<path d="M12 22a7 7 0 0 0 7-7c0-2-1-4-3-6l-4-5-4 5c-2 2-3 4-3 6a7 7 0 0 0 7 7Z"/>'
  ],
  ['weight',
    '<path d="M6.5 6.5h11l1.5 13.5h-14L6.5 6.5Z"/>' +
    '<path d="M9 6.5a3 3 0 0 1 6 0"/>'
  ],
  ['thermometer',
    '<path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"/>'
  ],
  ['oral-syringe',
    // Oral syringe — horizontal, three clearly distinct zones:
    //   [thumb-rest]==[plunger-rod]==[FINGER-FLANGE]┃[BARREL with ticks]┃[nozzle]
    // Plunger thumb rest (small bar, far left)
    '<path d="M2 10.5v3"/>' +
    // Plunger rod (thin line connecting thumb rest to barrel)
    '<path d="M2 12h3"/>' +
    // Finger flange (TALL bar — clearly taller than barrel — main visual anchor for "syringe")
    '<path d="M5 7v10"/>' +
    // Barrel (rectangle, thinner than flange height)
    '<path d="M5 9.5h11v5H5"/>' +
    // Three dosing graduations on top edge of barrel
    '<path d="M8 9.5v1.5"/>' +
    '<path d="M11 9.5v1.5"/>' +
    '<path d="M14 9.5v1.5"/>' +
    // Nozzle — narrows from barrel, then extends as long thin tip
    '<path d="M16 10.5h2v3h-2"/>' +
    '<path d="M18 11.5h4"/>'
  ],
  ['user',
    '<path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>' +
    '<circle cx="12" cy="7" r="4"/>'
  ],
  ['bell',
    '<path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/>' +
    '<path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/>'
  ],
  ['shield',
    '<path d="M20 13c0 5-3.5 7.5-8 9-4.5-1.5-8-4-8-9V5l8-3 8 3v8Z"/>'
  ],
  ['info',
    '<circle cx="12" cy="12" r="10"/>' +
    '<path d="M12 16v-4"/>' +
    '<path d="M12 8h0"/>'
  ],
  ['check',
    '<path d="m5 12 5 5L20 7"/>'
  ],
  ['plus',
    '<path d="M12 5v14"/>' +
    '<path d="M5 12h14"/>'
  ],
  ['chevron-right',
    '<path d="m9 6 6 6-6 6"/>'
  ]
];
document.getElementById('row').innerHTML = icons.map(([n,svg])=>
  `<div class="icon-tile"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="${W}" stroke-linecap="round" stroke-linejoin="round">${svg}</svg><div class="name">${n}</div></div>`
).join('');
</script>
</div></body></html>
