<!doctype html>
<!-- @dsCard group="Cappy — Components" name="Dose-status pill" subtitle="The four dose-safety states — Cappy's signature component" viewport="640x300" -->
<html><head><meta charset="utf-8"><title>Dose-status pill</title>
<link rel="stylesheet" href="../../styles.css">
<style>
  body { margin: 0; font-family: var(--font-sans); }
  .frame { background: var(--bg); padding: 26px; }
  .h { font-family: var(--font-display); font-weight: 800; font-size: 15px; color: var(--fg); margin: 0 0 4px; letter-spacing: -0.01em; }
  .sub { font-size: 12px; color: var(--fg-3); margin: 0 0 20px; }
  .grid { display: flex; flex-direction: column; gap: 13px; }
  .row { display: flex; align-items: center; gap: 14px; }
  .row .desc { font-size: 12.5px; color: var(--fg-2); }
  .lab { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.07em; text-transform: uppercase; color: var(--fg-3); width: 64px; flex: 0 0 auto; }
  .sizes { display: flex; gap: 10px; align-items: center; margin-top: 6px; padding-top: 14px; border-top: 1px solid var(--hairline); }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const ns = window.CloseDoseDesignSystem_019dff || {};
const DoseStatusPill = ns.DoseStatusPill;
const STATES = [
  ['due',     'Enough time has passed — a dose may be given'],
  ['early',   'Too soon for another dose — wait'],
  ['recent',  'A dose was just logged — informational'],
  ['overdue', 'An expected dose window has passed'],
];
function Demo() {
  if (!DoseStatusPill) return <div className="sub">Component bundle is rebuilding — reopen in a moment.</div>;
  return (
    <div className="grid">
      {STATES.map(([s, desc]) => (
        <div className="row" key={s}>
          <span className="lab">{s}</span>
          <DoseStatusPill status={s}/>
          <span className="desc">{desc}</span>
        </div>
      ))}
      <div className="sizes">
        <span className="lab">sm</span>
        {STATES.map(([s]) => <DoseStatusPill key={s} status={s} size="sm"/>)}
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(
  <div className="frame">
    <div className="h">Dose-status pill</div>
    <div className="sub">Color reinforces safe-vs-too-early — always pair with the safety line.</div>
    <Demo/>
  </div>
);
</script>
</body></html>
