<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Onboarding" description="The warm first-run flow: meet Cappy, understand shared family records and the NFC tap, in a few calm steps." -->
<helmet>
<script src="./ds-base.js"></script>
<style>
  @keyframes cappy-pop { 0% { transform:scale(0.85); opacity:0; } 60% { transform:scale(1.05); } 100% { transform:scale(1); opacity:1; } }
  @keyframes cappy-fade { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
</style>
</helmet>

<div data-theme="{{ theme }}" style="position:relative; width:390px; height:844px; overflow:hidden; background:var(--bg); font-family:var(--font-sans); color:var(--fg); -webkit-font-smoothing:antialiased; display:flex; flex-direction:column;">

  <div style="height:50px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding:0 24px; font-size:14px; font-weight:700;">
    <span>9:41</span><span style="font-size:11px; color:var(--fg-3);">●●● ◢ 100%</span>
  </div>

  <!-- soft mint wash -->
  <div style="position:absolute; top:-80px; left:50%; transform:translateX(-50%); width:520px; height:420px; border-radius:50%; background:radial-gradient(circle, var(--bg-tint) 0%, rgba(0,0,0,0) 68%); pointer-events:none;"></div>

  <div style="flex:1; min-height:0; display:flex; flex-direction:column; align-items:center; text-align:center; padding:18px 28px 0; position:relative;">
    <!-- mascot -->
    <div style="width:148px; height:148px; border-radius:50%; overflow:hidden; box-shadow:var(--shadow-3); border:4px solid var(--bg-card); margin-top:18px; animation:cappy-pop 600ms var(--ease-out-soft);">
      <img src="../../assets/cappy-mark.png" alt="Cappy" style="width:100%; height:100%; object-fit:cover; display:block;">
    </div>

    <div style="margin-top:34px; animation:cappy-fade 420ms ease both;">
      <div style="font-family:var(--font-mono); font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent-2); font-weight:600;">{{ step.eyebrow }}</div>
      <div style="font-family:var(--font-display); font-weight:800; font-size:30px; letter-spacing:-0.025em; line-height:1.1; margin-top:12px;">{{ step.title }}</div>
      <div style="font-size:15px; color:var(--fg-2); line-height:1.6; margin-top:14px; max-width:30ch;">{{ step.body }}</div>
    </div>

    <!-- feature row for relevant step -->
    <sc-if value="{{ step.showFeatures }}" hint-placeholder-val="{{ false }}">
      <div style="display:flex; flex-direction:column; gap:10px; width:100%; margin-top:26px;">
        <sc-for list="{{ features }}" as="f" hint-placeholder-count="3">
          <div style="display:flex; gap:13px; align-items:center; background:var(--bg-card); border:1px solid var(--border); border-radius:15px; padding:13px 15px; box-shadow:var(--shadow-1); text-align:left;">
            <div style="width:40px; height:40px; border-radius:12px; flex:0 0 auto; display:grid; place-items:center; font-size:18px; background:{{ f.bg }}; color:{{ f.fg }};">{{ f.ic }}</div>
            <div style="flex:1;">
              <div style="font-weight:700; font-size:14px;">{{ f.title }}</div>
              <div style="font-size:12px; color:var(--fg-3); margin-top:1px;">{{ f.sub }}</div>
            </div>
          </div>
        </sc-for>
      </div>
    </sc-if>
  </div>

  <!-- footer: dots + CTA -->
  <div style="flex:0 0 auto; padding:18px 28px 34px;">
    <div style="display:flex; gap:7px; justify-content:center; margin-bottom:18px;">
      <sc-for list="{{ dots }}" as="d" hint-placeholder-count="3">
        <div style="height:7px; border-radius:999px; width:{{ d.w }}; background:{{ d.bg }}; transition:all 260ms var(--ease-out-soft);"></div>
      </sc-for>
    </div>
    <button onClick="{{ next }}" style="width:100%; height:56px; border:none; border-radius:16px; background:var(--brand); color:var(--fg-on-brand); font-family:var(--font-sans); font-weight:700; font-size:16px; cursor:pointer; box-shadow:var(--shadow-2);">{{ step.cta }}</button>
    <div onClick="{{ skip }}" style="text-align:center; margin-top:14px; font-size:13px; color:var(--fg-3); font-weight:600; cursor:pointer;">{{ step.secondary }}</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;\&quot;light\&quot; | \&quot;dark\&quot;&quot;,&quot;section&quot;:&quot;Appearance&quot;}}">
class Component extends DCLogic {
  state = { i: 0 };
  renderVals() {
    const theme = this.props.theme || 'light';
    const STEPS = [
      { eyebrow:'Welcome', title:'Hi, I’m Cappy.', body:'I help your whole family keep medication straight — so no one ever has to text “did she already get Tylenol?”', cta:'Get started', secondary:'I already have a family code', showFeatures:false },
      { eyebrow:'How it works', title:'One shared, live record', body:'Everyone you trust sees the same up-to-date timeline the moment a dose is logged.', cta:'Next', secondary:'Skip', showFeatures:true },
      { eyebrow:'The magic', title:'Tap to log in seconds', body:'Hold your phone to a tagged bottle and Cappy opens straight to the right child and dose.', cta:'Create my family', secondary:'Maybe later', showFeatures:false }
    ];
    const i = this.state.i;
    const step = STEPS[i];
    const dots = STEPS.map((_, j) => ({
      w: j === i ? '22px' : '7px',
      bg: j === i ? 'var(--brand)' : 'var(--slate-300)'
    }));
    const features = [
      { ic:'⚡', bg:'var(--dose-due-bg)', fg:'var(--dose-due-fg)', title:'Live sync', sub:'Updates reach every caregiver instantly' },
      { ic:'⏱', bg:'var(--dose-early-bg)', fg:'var(--dose-early-fg)', title:'Too-early guard', sub:'See at a glance if it’s safe to give' },
      { ic:'⌖', bg:'var(--dose-recent-bg)', fg:'var(--dose-recent-fg)', title:'Always attributed', sub:'Know who logged what, and when' }
    ];
    return {
      theme, step, dots, features,
      next: () => this.setState(s => ({ i: Math.min(STEPS.length - 1, s.i + 1) })),
      skip: () => this.setState({ i: 0 })
    };
  }
}
</script>
</body>
</html>
