<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<!-- @template name="Shared timeline" description="The family-wide medication history every caregiver can read: date-grouped, attributed dose events with correction markers — built for handoff." -->
<helmet>
<script src="./ds-base.js"></script>
</helmet>

<div data-theme="{{ theme }}" style="position:relative; width:390px; height:844px; overflow:hidden; background:var(--bg); font-family:var(--font-sans); color:var(--fg); -webkit-font-smoothing:antialiased; display:flex; flex-direction:column;">

  <div style="height:50px; flex:0 0 auto; display:flex; align-items:center; justify-content:space-between; padding:0 24px; font-size:14px; font-weight:700;">
    <span>9:41</span><span style="font-size:11px; color:var(--fg-3);">●●● ◢ 100%</span>
  </div>

  <!-- header -->
  <div style="flex:0 0 auto; padding:4px 16px 14px;">
    <div style="font-family:var(--font-display); font-weight:800; font-size:26px; letter-spacing:-0.02em;">Timeline</div>
    <div style="font-size:13px; color:var(--fg-2); margin-top:2px;">Everything every caregiver has logged.</div>
    <!-- filter chips -->
    <div style="display:flex; gap:8px; margin-top:14px; overflow:auto;">
      <sc-for list="{{ filters }}" as="f" hint-placeholder-count="4">
        <div onClick="{{ f.onClick }}" style="white-space:nowrap; cursor:pointer; font-size:12.5px; font-weight:700; padding:8px 14px; border-radius:999px; border:1px solid {{ f.border }}; background:{{ f.bg }}; color:{{ f.fg }};">{{ f.label }}</div>
      </sc-for>
    </div>
  </div>

  <div style="flex:1; min-height:0; overflow:auto; padding:6px 16px 40px;">
    <sc-for list="{{ groups }}" as="g" hint-placeholder-count="2">
      <div style="margin-bottom:8px;">
        <div style="font-family:var(--font-mono); font-size:10.5px; letter-spacing:0.08em; text-transform:uppercase; color:var(--fg-3); margin:14px 0 12px; position:sticky; top:0;">{{ g.day }}</div>
        <div style="padding-left:4px;">
          <sc-for list="{{ g.events }}" as="e" hint-placeholder-count="3">
            <div style="display:flex; gap:13px; position:relative; padding-bottom:18px;">
              <div style="position:absolute; left:18px; top:38px; bottom:-2px; width:2px; background:var(--hairline);"></div>
              <div style="width:38px; height:38px; border-radius:11px; flex:0 0 auto; display:grid; place-items:center; color:#fff; font-family:var(--font-display); font-weight:800; font-size:14px; background:{{ e.icBg }}; z-index:1;">{{ e.ic }}</div>
              <div style="flex:1; min-width:0; background:var(--bg-card); border:1px solid var(--border); border-radius:14px; padding:11px 13px; box-shadow:var(--shadow-1);">
                <div style="display:flex; align-items:baseline; gap:8px;">
                  <div style="flex:1; font-size:14px;"><b style="font-weight:700;">{{ e.title }}</b></div>
                  <div style="font-family:var(--font-mono); font-size:10.5px; color:var(--fg-3); white-space:nowrap;">{{ e.time }}</div>
                </div>
                <div style="display:flex; gap:8px; align-items:center; margin-top:7px;">
                  <div style="width:20px; height:20px; border-radius:50%; display:grid; place-items:center; color:#fff; font-size:8px; font-family:var(--font-display); font-weight:800; background:{{ e.whoGrad }};">{{ e.who }}</div>
                  <span style="font-size:11.5px; color:var(--fg-2);">{{ e.byline }}</span>
                  <sc-if value="{{ e.corrected }}" hint-placeholder-val="{{ false }}">
                    <span style="font-family:var(--font-mono); font-size:9px; letter-spacing:0.04em; padding:2px 6px; border-radius:5px; background:var(--bg-inset); color:var(--fg-3); border:1px solid var(--hairline);">CORRECTED</span>
                  </sc-if>
                </div>
              </div>
            </div>
          </sc-for>
        </div>
      </div>
    </sc-for>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:844},&quot;theme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;light&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;light&quot;,&quot;tsType&quot;:&quot;\&quot;light\&quot; | \&quot;dark\&quot;&quot;,&quot;section&quot;:&quot;Appearance&quot;}}">
class Component extends DCLogic {
  state = { filter: 0 };
  renderVals() {
    const theme = this.props.theme || 'light';
    const labels = ['All', 'Emma', 'Noah', 'Ava', 'Acetaminophen'];
    const fi = this.state.filter;
    const filters = labels.map((label, i) => {
      const active = i === fi;
      return {
        label,
        bg: active ? 'var(--brand)' : 'var(--bg-card)',
        fg: active ? 'var(--fg-on-brand)' : 'var(--fg-2)',
        border: active ? 'var(--brand)' : 'var(--border)',
        onClick: () => this.setState({ filter: i })
      };
    });
    const teal = 'linear-gradient(150deg,var(--teal-400),var(--teal-600))';
    const blue = 'linear-gradient(150deg,var(--blue-400),var(--blue-600))';
    const tan = 'linear-gradient(150deg,var(--tan-300),var(--tan-500))';
    const groups = [
      { day:'Today', events:[
        { ic:'A', icBg:'var(--dose-recent-solid)', title:'Acetaminophen · 5 mL · Ava', time:'9:21 PM', who:'GP', whoGrad:tan, byline:'Grandpa Ray', corrected:false },
        { ic:'A', icBg:'var(--dose-recent-solid)', title:'Acetaminophen · 5 mL · Emma', time:'4:48 PM', who:'DJ', whoGrad:blue, byline:'Dad (David)', corrected:false },
        { ic:'⚖', icBg:'var(--teal-500)', title:'Weight updated · Emma · 38 lb', time:'2:10 PM', who:'SR', whoGrad:teal, byline:'You', corrected:false }
      ]},
      { day:'Yesterday', events:[
        { ic:'I', icBg:'var(--dose-recent-solid)', title:'Ibuprofen · 5 mL · Noah', time:'8:10 PM', who:'GP', whoGrad:tan, byline:'Grandpa Ray', corrected:true },
        { ic:'A', icBg:'var(--dose-recent-solid)', title:'Acetaminophen · 5 mL · Emma', time:'11:40 AM', who:'SR', whoGrad:teal, byline:'You', corrected:false }
      ]}
    ];
    return { theme, filters, groups };
  }
}
</script>
</body>
</html>
