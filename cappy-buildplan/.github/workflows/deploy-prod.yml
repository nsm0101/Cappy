name: Deploy to production

on:
  push:
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to deploy'
        required: true
        type: string

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:

  preflight:
    name: Preflight (verify CI green on this commit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
      - name: Verify CI succeeded
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA=$(git rev-parse HEAD)
          STATUS=$(gh api "repos/${{ github.repository }}/commits/$SHA/check-runs" \
            --jq '[.check_runs[] | select(.name=="Server (lint, typecheck, test)") | .conclusion] | .[0]')
          if [ "$STATUS" != "success" ]; then
            echo "::error::CI did not succeed on $SHA (status: $STATUS)"
            exit 1
          fi

  deploy:
    name: Deploy server to production
    needs: preflight
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://api.cappy.app
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: server
        run: pnpm build

      - name: Run migrations against production
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
        run: pnpm db:migrate

      - name: Deploy
        run: |
          echo "::warning::Deploy step not yet wired to a host."

      - name: Smoke test
        env:
          PROD_URL: https://api.cappy.app
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "$PROD_URL/v1/healthz" | grep -q '"status":"ok"'; then
              echo "Healthcheck passed"
              exit 0
            fi
            sleep 10
          done
          echo "::error::Healthcheck failed"
          exit 1
