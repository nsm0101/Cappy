name: Deploy to staging

on:
  push:
    branches: [main]

concurrency:
  group: deploy-staging
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy server to staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: server/pnpm-lock.yaml

      - name: Install
        working-directory: server
        run: pnpm install --frozen-lockfile

      - name: Build
        working-directory: server
        run: pnpm build

      - name: Run migrations against staging
        working-directory: server
        env:
          DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
        run: pnpm db:migrate

      # Replace this step with your actual hosting target
      # (Fly.io, Railway, Render, your own VM, ECS, etc.)
      - name: Deploy
        run: |
          echo "::warning::Deploy step not yet wired to a host."
          echo "Add a deploy step here for your chosen hosting target."

      - name: Smoke test
        env:
          STAGING_URL: ${{ secrets.STAGING_URL }}
        run: |
          for i in 1 2 3 4 5; do
            if curl -sf "$STAGING_URL/v1/healthz" | grep -q '"status":"ok"'; then
              echo "Healthcheck passed"
              exit 0
            fi
            sleep 5
          done
          echo "::error::Healthcheck failed after 5 attempts"
          exit 1
